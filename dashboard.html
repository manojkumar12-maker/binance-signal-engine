<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance Signal Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0d1117;
            --bg2: #161b22;
            --border: #30363d;
            --green: #3fb950;
            --red: #f85149;
            --yellow: #d29922;
            --blue: #58a6ff;
            --text: #c9d1d9;
            --text2: #8b949e;
        }
        body { font-family: 'IBM Plex Mono', monospace; background: var(--bg); color: var(--text); padding: 20px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 700; color: var(--yellow); }
        .refresh { font-size: 12px; color: var(--text2); }
        
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat { background: var(--bg2); padding: 16px; border-radius: 8px; text-align: center; border: 1px solid var(--border); }
        .stat-label { font-size: 11px; color: var(--text2); text-transform: uppercase; }
        .stat-value { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 700; margin-top: 8px; }
        .stat.wins .stat-value { color: var(--green); }
        .stat.losses .stat-value { color: var(--red); }
        .stat.winrate .stat-value { color: var(--blue); }
        .stat.pnl .stat-value.positive { color: var(--green); }
        .stat.pnl .stat-value.negative { color: var(--red); }
        
        .pipeline { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
        .pipe { background: var(--bg2); padding: 12px; border-radius: 8px; text-align: center; border: 1px solid var(--border); }
        .pipe-label { font-size: 10px; color: var(--text2); text-transform: uppercase; }
        .pipe-value { font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 700; }
        .pipe-value.pending { color: var(--yellow); }
        .pipe-value.confirmed { color: var(--green); }
        .pipe-value.executed { color: var(--blue); }
        .pipe-value.rejected { color: var(--red); }
        
        h2 { font-family: 'Orbitron', sans-serif; font-size: 14px; margin-bottom: 12px; color: var(--text); }
        
        table { width: 100%; border-collapse: collapse; background: var(--bg2); border-radius: 8px; overflow: hidden; margin-bottom: 20px; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 12px; }
        th { background: var(--bg); color: var(--text2); font-size: 10px; text-transform: uppercase; font-weight: 600; }
        .pair { font-weight: 600; }
        .buy { color: var(--green); }
        .sell { color: var(--red); }
        .pnl-pos { color: var(--green); }
        .pnl-neg { color: var(--red); }
        
        .empty { text-align: center; color: var(--text2); padding: 30px; }
        
        @media (max-width: 768px) {
            .stats, .pipeline { grid-template-columns: repeat(2, 1fr); }
            .header { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">⚡ BINANCE SIGNAL ENGINE</div>
        <div class="refresh" id="lastUpdate">Loading...</div>
    </div>
    
    <div class="stats">
        <div class="stat wins">
            <div class="stat-label">Wins</div>
            <div class="stat-value" id="wins">0</div>
        </div>
        <div class="stat losses">
            <div class="stat-label">Losses</div>
            <div class="stat-value" id="losses">0</div>
        </div>
        <div class="stat winrate">
            <div class="stat-label">Win Rate</div>
            <div class="stat-value" id="winrate">0%</div>
        </div>
        <div class="stat pnl">
            <div class="stat-label">Total P&L</div>
            <div class="stat-value" id="totalPnl">0%</div>
        </div>
    </div>
    
    <div class="pipeline">
        <div class="pipe">
            <div class="pipe-label">Pending</div>
            <div class="pipe-value pending" id="pending">0</div>
        </div>
        <div class="pipe">
            <div class="pipe-label">Confirmed</div>
            <div class="pipe-value confirmed" id="confirmed">0</div>
        </div>
        <div class="pipe">
            <div class="pipe-label">Executed</div>
            <div class="pipe-value executed" id="executed">0</div>
        </div>
        <div class="pipe">
            <div class="pipe-label">Rejected</div>
            <div class="pipe-value rejected" id="rejected">0</div>
        </div>
    </div>
    
    <h2>📊 Active Trades</h2>
    <table id="activeTable">
        <thead><tr><th>Pair</th><th>Type</th><th>Entry</th><th>Current</th><th>SL</th><th>P/L</th></tr></thead>
        <tbody id="activeBody"></tbody>
    </table>
    
    <h2>🔒 Closed Trades</h2>
    <table id="closedTable">
        <thead><tr><th>Pair</th><th>Type</th><th>Entry</th><th>Exit</th><th>Status</th><th>P/L</th></tr></thead>
        <tbody id="closedBody"></tbody>
    </table>
    
    <script>
        const API = 'https://binance-signal-engine-production.up.railway.app/api';
        
        function fmt(num) {
            if (!num || num === 0) return '--';
            return num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: num < 1 ? 6 : 2 });
        }
        
        async function fetchAll() {
            try {
                const [signalsRes, tradesRes, closedRes, analyticsRes] = await Promise.all([
                    fetch(API + '/signal-states'),
                    fetch(API + '/trades?status=open'),
                    fetch(API + '/trades?status=closed'),
                    fetch(API + '/analytics')
                ]);
                
                const signals = await signalsRes.json();
                const trades = await tradesRes.json();
                const closed = await closedRes.json();
                const analytics = await analyticsRes.json();
                
                document.getElementById('wins').textContent = analytics.wins || 0;
                document.getElementById('losses').textContent = analytics.losses || 0;
                document.getElementById('winrate').textContent = (analytics.win_rate || 0) + '%';
                
                const pnlEl = document.getElementById('totalPnl');
                const pnl = analytics.total_pnl || 0;
                pnlEl.textContent = (pnl >= 0 ? '+' : '') + pnl + '%';
                pnlEl.className = 'stat-value ' + (pnl >= 0 ? 'positive' : 'negative');
                
                const sigs = signals.signals || [];
                document.getElementById('pending').textContent = sigs.filter(s => s.signal_state === 'PENDING').length;
                document.getElementById('confirmed').textContent = sigs.filter(s => s.signal_state === 'CONFIRMED').length;
                document.getElementById('executed').textContent = sigs.filter(s => s.signal_state === 'EXECUTED').length;
                document.getElementById('rejected').textContent = sigs.filter(s => s.signal_state === 'REJECTED').length;
                
                const activeBody = document.getElementById('activeBody');
                if ((trades.trades || []).length === 0) {
                    activeBody.innerHTML = '<tr><td colspan="6" class="empty">No active trades</td></tr>';
                } else {
                    activeBody.innerHTML = (trades.trades || []).map(t => {
                        const pnl = t.pnl || 0;
                        return `<tr>
                            <td class="pair">${t.pair}</td>
                            <td class="${t.type?.toLowerCase()}">${t.type}</td>
                            <td>${fmt(t.entry)}</td>
                            <td>${fmt(t.current_price)}</td>
                            <td>${fmt(t.sl)}</td>
                            <td class="${pnl >= 0 ? 'pnl-pos' : 'pnl-neg'}">${pnl >= 0 ? '+' : ''}${pnl}%</td>
                        </tr>`;
                    }).join('');
                }
                
                const closedBody = document.getElementById('closedBody');
                if ((closed.trades || []).length === 0) {
                    closedBody.innerHTML = '<tr><td colspan="6" class="empty">No closed trades</td></tr>';
                } else {
                    closedBody.innerHTML = (closed.trades || []).map(t => {
                        const pnl = t.pnl_pct || 0;
                        return `<tr>
                            <td class="pair">${t.pair}</td>
                            <td class="${t.type?.toLowerCase()}">${t.type}</td>
                            <td>${fmt(t.entry)}</td>
                            <td>${fmt(t.current_price)}</td>
                            <td>${t.status}</td>
                            <td class="${pnl >= 0 ? 'pnl-pos' : 'pnl-neg'}">${pnl >= 0 ? '+' : ''}${pnl}%</td>
                        </tr>`;
                    }).join('');
                }
                
                document.getElementById('lastUpdate').textContent = 'Updated: ' + new Date().toLocaleTimeString();
            } catch(e) {
                console.error(e);
                document.getElementById('lastUpdate').textContent = 'Error loading data';
            }
        }
        
        fetchAll();
        setInterval(fetchAll, 5000);
    </script>
</body>
</html>
