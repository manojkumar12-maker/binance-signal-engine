<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance Pump Signals</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e17;
            color: #e2e8f0;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1a1f2e 0%, #0f1419 100%);
            padding: 20px 40px;
            border-bottom: 1px solid #1e293b;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            font-size: 28px;
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #f0b90b, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-bar {
            display: flex;
            gap: 30px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #f0b90b;
        }

        .stat-label {
            font-size: 12px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 20px;
            border: 1px solid #10b981;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 40px;
        }

        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-btn.pre-pump {
            border-color: #8b5cf6;
        }
        .filter-btn.pre-pump:hover, .filter-btn.pre-pump.active {
            background: #8b5cf6;
            color: #fff;
            border-color: #8b5cf6;
        }

        .filter-btn.early {
            border-color: #eab308;
        }
        .filter-btn.early:hover, .filter-btn.early.active {
            background: #eab308;
            color: #000;
            border-color: #eab308;
        }

        .filter-btn.pump-confirmed {
            border-color: #f97316;
        }
        .filter-btn.pump-confirmed:hover, .filter-btn.pump-confirmed.active {
            background: #f97316;
            color: #fff;
            border-color: #f97316;
        }
        
        .filter-btn {
            padding: 10px 20px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .filter-btn:hover, .filter-btn.active {
            background: #f0b90b;
            color: #000;
            border-color: #f0b90b;
        }
        
        .panel-section {
            margin-bottom: 30px;
        }
        
        .panel-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .panel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }
        
        .panel-item {
            background: linear-gradient(135deg, #1a1f2e 0%, #141920 100%);
            border: 1px solid #1e293b;
            border-radius: 10px;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .panel-item.pump-confirmed {
            border-color: #f97316;
            background: linear-gradient(135deg, rgba(249,115,22,0.1) 0%, #141920 100%);
        }
        
        .panel-item.pre-pump {
            border-color: #8b5cf6;
            background: linear-gradient(135deg, rgba(139,92,246,0.1) 0%, #141920 100%);
        }

        .signals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
        }

        .signal-card {
            background: linear-gradient(135deg, #1a1f2e 0%, #141920 100%);
            border-radius: 16px;
            border: 1px solid #1e293b;
            overflow: hidden;
            transition: all 0.3s;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .signal-card:hover {
            border-color: #f0b90b;
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(240, 185, 11, 0.1);
        }

        .signal-header {
            background: linear-gradient(135deg, #f0b90b, #ffd700);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .signal-symbol {
            font-size: 20px;
            font-weight: 700;
            color: #000;
        }

        .signal-badge {
            background: rgba(0,0,0,0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: #000;
        }

        .signal-body {
            padding: 20px;
        }

        .signal-price {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .price-item {
            background: rgba(30, 41, 59, 0.5);
            padding: 12px;
            border-radius: 10px;
        }

        .price-label {
            font-size: 11px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .price-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            font-weight: 600;
        }

        .price-value.entry { color: #3b82f6; }
        .price-value.tp { color: #10b981; }
        .price-value.sl { color: #ef4444; }

        .tp-levels {
            margin-bottom: 20px;
        }

        .tp-levels-title {
            font-size: 12px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .tp-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .tp-item {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid #10b981;
            border-radius: 8px;
            padding: 10px 5px;
            text-align: center;
        }

        .tp-label {
            font-size: 10px;
            color: #10b981;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .tp-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #10b981;
        }

        .tp-percent {
            font-size: 9px;
            color: #64748b;
            margin-top: 3px;
        }

        .signal-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #1e293b;
        }

        .signal-time {
            font-size: 12px;
            color: #64748b;
        }

        .signal-rank {
            font-size: 13px;
            font-weight: bold;
            color: #fbbf24;
        }

        .signal-oi {
            font-size: 12px;
            color: #94a3b8;
        }

        .signal-strength {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .strength-bar {
            width: 60px;
            height: 6px;
            background: #1e293b;
            border-radius: 3px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            background: linear-gradient(90deg, #f0b90b, #ffd700);
            border-radius: 3px;
            transition: width 0.3s;
        }

        .strength-value {
            font-size: 12px;
            font-weight: 600;
            color: #f0b90b;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #64748b;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .empty-text {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .empty-subtext {
            font-size: 14px;
            color: #475569;
        }

        .notification-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #f0b90b, #ffd700);
            color: #000;
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: 600;
            animation: slideIn 0.5s ease, fadeOut 0.5s ease 4.5s;
            z-index: 1000;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeOut {
            to { opacity: 0; transform: translateX(100%); }
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 20px;
            }
            .stats-bar {
                flex-wrap: wrap;
                justify-content: center;
            }
            .signals-grid {
                grid-template-columns: 1fr;
            }
            .main-content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <span class="logo-icon">🚀</span>
                <h1>Binance Pump Signals</h1>
            </div>
            <div class="stats-bar">
                <div class="stat-item">
                    <div class="stat-value" id="totalSignals">0</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat-item" style="color: #ef4444;">
                    <div class="stat-value" id="sniperSignals">0</div>
                    <div class="stat-label">🔴 Sniper</div>
                </div>
                <div class="stat-item" style="color: #10b981;">
                    <div class="stat-value" id="confirmedSignals">0</div>
                    <div class="stat-label">🟢 Confirmed</div>
                </div>
                <div class="stat-item" style="color: #f97316;">
                    <div class="stat-value" id="pumpConfirmedSignals">0</div>
                    <div class="stat-label">🚀 Pump</div>
                </div>
                <div class="stat-item" style="color: #8b5cf6;">
                    <div class="stat-value" id="prePumpSignals">0</div>
                    <div class="stat-label">🟣 Pre</div>
                </div>
                <div class="stat-item" style="color: #eab308;">
                    <div class="stat-value" id="earlySignals">0</div>
                    <div class="stat-label">🟡 Early</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="activeSignals">0</div>
                    <div class="stat-label">Active</div>
                </div>
            </div>
            <div class="status-indicator">
                <div class="status-dot"></div>
                <span>Live</span>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="filters">
            <button class="filter-btn active" data-filter="all">All Signals</button>
            <button class="filter-btn" data-filter="sniper">🔴 Sniper</button>
            <button class="filter-btn pump-confirmed" data-filter="pump-confirmed">🚀 Pump Confirmed</button>
            <button class="filter-btn" data-filter="confirmed">🟢 Confirmed</button>
            <button class="filter-btn pre-pump" data-filter="pre-pump">🟣 Pre-Pump</button>
            <button class="filter-btn" data-filter="early">🟡 Early</button>
        </div>
        
        <div class="panel-section">
            <div class="panel-title">🚀 PUMP-CONFIRMED PANEL</div>
            <div class="panel-grid" id="pumpConfirmedPanel">
                <div class="panel-item pump-confirmed">
                    <span>Waiting for signals...</span>
                </div>
            </div>
        </div>
        
        <div class="panel-section">
            <div class="panel-title">🟣 PRE-PUMP PANEL</div>
            <div class="panel-grid" id="prePumpPanel">
                <div class="panel-item pre-pump">
                    <span>Waiting for signals...</span>
                </div>
            </div>
        </div>
        
        <div id="signalsSection"></div>
            <div class="empty-state">
                <div class="empty-icon">📊</div>
                <div class="empty-text">No signals yet</div>
                <div class="empty-subtext">Waiting for pump signals...</div>
            </div>
        </div>
    </main>

    <script>
        class SignalDashboard {
            constructor() {
                this.signals = [];
                this.prePumpSignals = [];
                this.pumpConfirmedSignals = [];
                this.filter = 'all';
                this.stats = {
                    total: 0,
                    active: 0,
                    sniper: 0,
                    confirmed: 0,
                    prePump: 0,
                    pumpConfirmed: 0
                };

                // ⚡ Set your Railway backend URL here
                this.apiBase = 'https://binance-signal-engine-production.up.railway.app';
                this.fetchStats();
                this.fetchSignals();
                this.initFilters();
            }

            async fetchStats() {
                try {
                    const response = await fetch(`${this.apiBase}/api/stats`);
                    if (response.ok) {
                        const data = await response.json();
                        this.stats.total = data.signalsGenerated || 0;
                        this.stats.active = data.activeSignals || 0;
                        const tiers = data.signalsByTier || {};
                        this.stats.sniper = tiers.SNIPER || 0;
                        this.stats.confirmed = tiers.CONFIRMED || 0;
                        this.stats.prePump = tiers.PRE_PUMP || 0;
                        this.stats.early = tiers.EARLY || 0;
                        this.stats.pumpConfirmed = tiers.PUMP_CONFIRMED || 0;
                        this.updateStats();
                    }
                } catch (error) {
                    console.error('Stats fetch error:', error);
                }
                setTimeout(() => this.fetchStats(), 10000);
            }

            async fetchSignals() {
                try {
                    const response = await fetch(`${this.apiBase}/api/signals`);
                    if (response.ok) {
                        const data = await response.json();
                        this.signals = data.signals || [];
                        this.prePumpSignals = this.signals.filter(s => s.tier === 'PRE_PUMP').slice(0, 10);
                        this.pumpConfirmedSignals = this.signals.filter(s => s.tier === 'PUMP_CONFIRMED' || s.type === 'PUMP_CONFIRMED').slice(0, 10);
                        this.renderPanels();
                        this.renderSignals();
                        this.fetchStats();
                    }
                } catch (error) {
                    console.log('Waiting for connection...');
                }
                setTimeout(() => this.fetchSignals(), 5000);
            }

            renderPanels() {
                const pumpPanel = document.getElementById('pumpConfirmedPanel');
                const prePanel = document.getElementById('prePumpPanel');
                
                if (this.pumpConfirmedSignals.length > 0) {
                    pumpPanel.innerHTML = this.pumpConfirmedSignals.map(s => `
                        <div class="panel-item pump-confirmed">
                            <span>⚡ ${s.symbol}</span>
                            <span style="color: ${s.priceChange > 0 ? '#10b981' : '#ef4444'}">${(s.priceChange || 0).toFixed(1)}%</span>
                        </div>
                    `).join('');
                } else {
                    pumpPanel.innerHTML = '<div class="panel-item pump-confirmed"><span>No pump signals detected</span></div>';
                }
                
                if (this.prePumpSignals.length > 0) {
                    prePanel.innerHTML = this.prePumpSignals.map(s => `
                        <div class="panel-item pre-pump">
                            <span>📊 ${s.symbol}</span>
                            <span style="color: ${s.priceChange > 0 ? '#10b981' : '#ef4444'}">${(s.priceChange || 0).toFixed(1)}%</span>
                        </div>
                    `).join('');
                } else {
                    prePanel.innerHTML = '<div class="panel-item pre-pump"><span>No pre-pump signals detected</span></div>';
                }
            }

            showNotification(message) {
                const toast = document.createElement('div');
                toast.className = 'notification-toast';
                toast.textContent = message;
                document.body.appendChild(toast);
                
                setTimeout(() => toast.remove(), 5000);
            }

            initFilters() {
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        this.filter = e.target.dataset.filter;
                        this.renderSignals();
                    });
                });
            }

            getFilteredSignals() {
                switch(this.filter) {
                    case 'sniper':
                        return this.signals.filter(s => s.tier === 'SNIPER');
                    case 'confirmed':
                        return this.signals.filter(s => s.tier === 'CONFIRMED');
                    case 'pre-pump':
                        return this.signals.filter(s => s.tier === 'PRE_PUMP');
                    case 'pump-confirmed':
                        return this.signals.filter(s => s.tier === 'PUMP_CONFIRMED' || s.type === 'PUMP_CONFIRMED');
                    case 'early':
                        return this.signals.filter(s => s.tier === 'EARLY');
                    default:
                        return this.signals;
                }
            }

            renderSignals() {
                const section = document.getElementById('signalsSection');
                const filtered = this.getFilteredSignals();

                if (filtered.length === 0) {
                    const messages = {
                        sniper: 'No Sniper signals yet',
                        confirmed: 'No Confirmed signals yet',
                        'pre-pump': 'No Pre-Pump signals yet',
                        'pump-confirmed': 'No Pump Confirmed signals yet',
                        early: 'No Early signals yet',
                        all: 'No signals found'
                    };
                    section.innerHTML = `
                        <div class="signals-grid">
                            <div class="empty-state">
                                <div class="empty-icon">📊</div>
                                <div class="empty-text">${messages[this.filter] || 'No signals found'}</div>
                                <div class="empty-subtext">Waiting for pump signals...</div>
                            </div>
                        </div>
                    `;
                    return;
                }

                const tierColors = {
                    'SNIPER': '#ef4444',
                    'PUMP_CONFIRMED': '#f97316',
                    'CONFIRMED': '#10b981',
                    'EARLY': '#eab308',
                    'PRE_PUMP': '#8b5cf6'
                };
                
                section.innerHTML = '<div class="signals-grid">' + filtered.map(signal => `
                    <div class="signal-card">
                        <div class="signal-header" style="background: ${tierColors[signal.tier] || '#f0b90b'}">
                            <span class="signal-symbol">${signal.symbol}</span>
                            <span class="signal-badge" style="background: rgba(0,0,0,0.2); color: #fff;">${signal.tier} ${signal.status || ''}</span>
                        </div>
                        <div class="signal-body">
                            <div class="signal-price">
                                <div class="price-item">
                                    <div class="price-label">Entry</div>
                                    <div class="price-value entry">${(signal.entryPrice || 0).toFixed(6)}</div>
                                </div>
                                <div class="price-item">
                                    <div class="price-label">Stop Loss</div>
                                    <div class="price-value sl">${(signal.stopLoss || 0).toFixed(6)}</div>
                                </div>
                            </div>
                            <div class="tp-levels">
                                <div class="tp-levels-title">Take Profit Levels</div>
                                <div class="tp-grid">
                                    ${[1,2,3,4,5].map(i => {
                                        const rr = signal.riskReward?.[`rr${i}`] || i;
                                        return `
                                        <div class="tp-item">
                                            <div class="tp-label">TP${i}</div>
                                            <div class="tp-value">${(signal.targets?.[`tp${i}`] || 0).toFixed(4)}</div>
                                            <div class="tp-percent">${rr.toFixed(1)}R</div>
                                        </div>
                                    `}).join('')}
                                </div>
                            </div>
                            <div class="signal-footer">
                                <span class="signal-time">${new Date(signal.timestamp).toLocaleString()}</span>
                                <div class="signal-rank" title="Rank Score">🏆 ${(signal.rankScore || 0).toFixed(0)}</div>
                                <div class="signal-oi">OI: ${(signal.oiChange || signal.metrics?.oiChange || 0).toFixed(1)}%</div>
                                <div class="signal-strength">
                                    <div class="strength-bar">
                                        <div class="strength-fill" style="width: ${signal.confidence || signal.metrics?.score || 0}%"></div>
                                    </div>
                                    <span class="strength-value">${Math.round(signal.confidence || signal.metrics?.score || 0)}%</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('') + '</div>';
            }

            updateStats() {
                document.getElementById('totalSignals').textContent = this.stats.total;
                document.getElementById('activeSignals').textContent = this.stats.active;
                document.getElementById('sniperSignals').textContent = this.stats.sniper;
                document.getElementById('confirmedSignals').textContent = this.stats.confirmed;
                document.getElementById('prePumpSignals').textContent = this.stats.prePump;
                document.getElementById('earlySignals').textContent = this.stats.early || 0;
                document.getElementById('pumpConfirmedSignals').textContent = this.stats.pumpConfirmed || 0;
            }

            async saveSignals() {
                const data = {
                    signals: this.signals.slice(0, 100),
                    lastUpdate: Date.now()
                };

                try {
                    localStorage.setItem('signals', JSON.stringify(data));
                } catch (error) {
                    console.log('Could not save to localStorage');
                }
            }
        }

        const dashboard = new SignalDashboard();
    </script>
</body>
</html>
