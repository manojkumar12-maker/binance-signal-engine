<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔥 Live Pump Detector</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }
    .header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 20px; border-bottom: 2px solid #f0b90b; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { color: #f0b90b; font-size: 1.8rem; }
    .container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; padding: 20px; }
    .panel { background: #121212; border-radius: 10px; padding: 15px; min-height: 260px; max-height: 70vh; overflow-y: auto; }
    .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #333; }
    .panel-title { font-size: 1.2rem; font-weight: bold; }
    .panel-pressure { border-top: 3px solid #9932cc; }
    .panel-breakout { border-top: 3px solid #ff8c00; }
    .panel-sniper { border-top: 3px solid #ff4444; }
    .panel-pressure .panel-title { color: #9932cc; }
    .panel-breakout .panel-title { color: #ff8c00; }
    .panel-sniper .panel-title { color: #ff4444; }
    .signal-card { background: #1e1e1e; border-radius: 8px; padding: 12px; margin-bottom: 10px; border-left: 3px solid; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    .signal-card.pressure { border-left-color: #9932cc; }
    .signal-card.breakout { border-left-color: #ff8c00; }
    .signal-card.sniper { border-left-color: #ff4444; }
    .signal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .symbol { font-weight: bold; font-size: 1.1rem; }
    .confidence { padding: 4px 10px; border-radius: 12px; font-weight: bold; font-size: 0.9rem; }
    .confidence.high { background: #22c55e; color: #000; }
    .confidence.good { background: #3b82f6; color: #fff; }
    .breakout-timer { font-size: 1.5rem; color: #ff8c00; font-weight: bold; }
    .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; font-size: 0.8rem; color: #aaa; }
    .metric { text-align: center; }
    .metric-value { color: #fff; font-weight: 500; }
    .empty-panel { text-align: center; color: #666; padding: 30px; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1e1e1e; }
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🔥 PUMP DETECTOR PRO</h1>
    <div id="apiStatus" style="font-size:0.9rem;color:#9acd32;">API: checking...</div>
  </div>

  <div class="container">
    <div class="panel panel-pressure">
      <div class="panel-header">
        <div class="panel-title">🧃 PRESSURE</div>
      </div>
      <div id="pressureSignals">
        <div class="empty-panel">Waiting...</div>
      </div>
    </div>

    <div class="panel panel-breakout">
      <div class="panel-header">
        <div class="panel-title">⏱️ BREAKOUT TIMER</div>
      </div>
      <div id="breakoutSignals">
        <div class="empty-panel">Waiting...</div>
      </div>
    </div>

    <div class="panel panel-sniper">
      <div class="panel-header">
        <div class="panel-title">🎯 SNIPER ENTRY</div>
      </div>
      <div id="sniperSignals">
        <div class="empty-panel">Waiting...</div>
      </div>
    </div>

    <div class="panel panel-sniper" style="grid-column: span 3;">
      <div class="panel-header">
        <div class="panel-title">📊 TOP OI MOVERS (last 120s)</div>
      </div>
      <div id="topOiList">
        <div class="empty-panel">Waiting for data...</div>
      </div>
    </div>
  </div>

  <script>
    // Allow overriding API/WS endpoints via query params for GitHub Pages:
    // ?api=https://your-railway.app&ws=wss://your-railway.app
    const params = new URLSearchParams(window.location.search);
    const API_BASE = (params.get('api') || '').replace(/\/$/, '');
    const WS_BASE = (params.get('ws') || '').replace(/\/$/, '');
    const apiStatus = document.getElementById('apiStatus');
    const signals = { pressure: [], breakout: [], sniper: [] };

    // Dynamically load socket.io from the backend to avoid GH Pages 404s
    const socketScript = document.createElement('script');
    socketScript.src = `${WS_BASE || ''}/socket.io/socket.io.js`;
    socketScript.onload = init;
    socketScript.onerror = () => {
      apiStatus.textContent = 'WS SCRIPT ERROR';
      apiStatus.style.color = '#ff4444';
    };
    document.head.appendChild(socketScript);

    function init() {
      const socket = io(WS_BASE || undefined, { transports: ['websocket', 'polling'] });
      socket.on('connect', () => console.log('Connected WS'));

    socket.on('connect', () => console.log('Connected'));
    
      socket.on('high_pump', (data) => {
        const card = `
          <div class="signal-card pressure">
            <div class="signal-header">
              <span class="symbol">${data.symbol}</span>
              <span class="confidence high">${data.strength}%</span>
          </div>
          <div class="metrics">
            <div class="metric"><div class="metric-value">${data.fakeOI?.toFixed(2) || '0'}</div><div>FakeOI</div></div>
            <div class="metric"><div class="metric-value">${data.flow?.toFixed(1) || '1'}</div><div>Flow</div></div>
            <div class="metric"><div class="metric-value">${data.volume?.toFixed(1) || '0'}x</div><div>Volume</div></div>
            <div class="metric"><div class="metric-value">${data.rankScore || 0}</div><div>Score</div></div>
          </div>
        </div>`;
        signals.pressure.unshift(card);
        signals.pressure = signals.pressure.slice(0, 15);
        updateUI();
      });

      socket.on('breakout', (data) => {
        const card = `
          <div class="signal-card breakout">
            <div class="signal-header">
              <span class="symbol">${data.symbol}</span>
              <span class="breakout-timer">⏱️ ${data.seconds}s</span>
            </div>
          </div>`;
        signals.breakout.unshift(card);
        signals.breakout = signals.breakout.slice(0, 10);
        updateUI();
      });

      socket.on('sniper', (data) => {
        const card = `
          <div class="signal-card sniper">
            <div class="signal-header">
              <span class="symbol">${data.symbol}</span>
              <span class="confidence high">🚀 ${data.confidence}%</span>
          </div>
          <div class="metrics">
            <div class="metric"><div class="metric-value">${data.entry?.toFixed(4)}</div><div>Entry</div></div>
            <div class="metric"><div class="metric-value">${data.stopLoss?.toFixed(4)}</div><div>SL</div></div>
            <div class="metric"><div class="metric-value">${data.tp1?.toFixed(4)}</div><div>TP1</div></div>
            <div class="metric"><div class="metric-value">${data.tp2?.toFixed(4)}</div><div>TP2</div></div>
          </div>
        </div>`;
        signals.sniper.unshift(card);
        signals.sniper = signals.sniper.slice(0, 10);
        updateUI();
      });

      socket.on('signal', (data) => {
        // Do nothing, sniper event is handled separately
      });
    }

    function updateUI() {
      document.getElementById('pressureSignals').innerHTML = signals.pressure.length ? signals.pressure.join('') : '<div class="empty-panel">Waiting...</div>';
      document.getElementById('breakoutSignals').innerHTML = signals.breakout.length ? signals.breakout.join('') : '<div class="empty-panel">Waiting...</div>';
      document.getElementById('sniperSignals').innerHTML = signals.sniper.length ? signals.sniper.join('') : '<div class="empty-panel">Waiting...</div>';
    }

    async function fetchTop() {
      const base = API_BASE || '';
      const endpoints = [`${base}/api/heatmap`, `${base}/heatmap`];
      for (const ep of endpoints) {
        try {
          const res = await fetch(ep);
          if (!res.ok) continue;
          const data = await res.json();
          apiStatus.textContent = `API OK (${ep})`;
          apiStatus.style.color = '#22c55e';

          const top = data.top || [];
          if (!top.length) {
            document.getElementById('topOiList').innerHTML = '<div class="empty-panel">No movers yet</div>';
            return;
          }
          const html = top.map((t, idx) => `
            <div class="signal-card sniper">
              <div class="signal-header">
                <span class="symbol">${idx + 1}. ${t.symbol}</span>
                <span class="confidence high">${(t.oi || 0).toFixed(3)}%</span>
              </div>
              <div class="metrics">
                <div class="metric"><div class="metric-value">${(t.volume || 0).toFixed(2)}x</div><div>Vol</div></div>
                <div class="metric"><div class="metric-value">${(t.momentum || 0).toFixed(3)}</div><div>Momentum</div></div>
                <div class="metric"><div class="metric-value">${(t.imbalance || 0).toFixed(2)}</div><div>OB Imb</div></div>
                <div class="metric"><div class="metric-value">${(t.rankScore || 0).toFixed(1)}</div><div>Score</div></div>
              </div>
            </div>
          `).join('');
          document.getElementById('topOiList').innerHTML = html;
          return;
        } catch (err) {
          continue;
        }
      }
      apiStatus.textContent = 'API ERROR';
      apiStatus.style.color = '#ff4444';
      document.getElementById('topOiList').innerHTML = '<div class="empty-panel">API not reachable</div>';
    }

    setInterval(fetchTop, 5000);
    fetchTop();

    console.log('📊 Dashboard ready');
  </script>
</body>
</html>
