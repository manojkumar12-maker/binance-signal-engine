<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance Signal Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="logo">
                <span class="logo-icon">⚡</span>
                <h1>BINANCE SIGNAL ENGINE</h1>
            </div>
            <div class="status-indicator" id="statusIndicator">
                <span class="status-dot"></span>
                <span class="status-text">Connecting...</span>
            </div>
        </header>

        <main class="main-content">
            <div class="panel analytics-panel" id="analyticsPanel">
                <h2 class="panel-title">📈 Analytics</h2>
            </div>
            
            <div class="panels-container">
                <div class="panel signals-panel" id="signalsPanel">
                    <h2 class="panel-title">🎯 Live Signals</h2>
                    <div class="table-container">
                        <table class="signals-table" id="signalsTable">
                            <thead>
                                <tr>
                                    <th>Pair</th>
                                    <th>Signal</th>
                                    <th>Entry</th>
                                    <th>SL</th>
                                    <th>TP1</th>
                                    <th>TP2</th>
                                    <th>TP3</th>
                                    <th>Conf%</th>
                                    <th>Risk%</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="signalsBody">
                            </tbody>
                        </table>
                    </div>
                </div>
                
                <div class="panel active-signals-panel">
                <div class="panel active-signals-panel">
                    <h2 class="panel-title">📊 Active Trades</h2>
                    <div class="table-container">
                        <table class="signals-table" id="activeSignalsTable">
                            <thead>
                                <tr>
                                    <th>Pair</th>
                                    <th>Type</th>
                                    <th>Current</th>
                                    <th>Limit</th>
                                    <th>TP1</th>
                                    <th>TP2</th>
                                    <th>TP3</th>
                                    <th>SL</th>
                                    <th>Conf%</th>
                                    <th>Updates</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="activeSignalsBody">
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="panel closed-signals-panel">
                    <h2 class="panel-title">🔒 Closed Trades</h2>
                    <div class="table-container">
                        <table class="signals-table" id="closedSignalsTable">
                            <thead>
                                <tr>
                                    <th>Pair</th>
                                    <th>Type</th>
                                    <th>Entry</th>
                                    <th>Status</th>
                                    <th>Remarks</th>
                                    <th>P/L</th>
                                </tr>
                            </thead>
                            <tbody id="closedSignalsBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <span class="last-update" id="lastUpdate">Last update: --</span>
            <span class="auto-refresh">Auto-refresh: 30s</span>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
